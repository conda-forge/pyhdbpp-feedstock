{% set name = "pyhdbpp" %}
{% set version = "2.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/8f/0c/bb19ae8e30e66e10b38b90ecb632dea5dff2c6ed74fc6e9b00026f166ad2/pyhdbpp-{{ version }}.tar.gz
  sha256: b31dca79073d587853219fc603a9e73dfe5fd285f02549cdc7c54b3f89bc5be0


build:
  entry_points:
    - hdbpp-reader = pyhdbpp.reader:main
    - hdb2csv = pyhdbpp.tools.hdb2csv:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - pyyaml
    - pymysql
    - psycopg2

test:
  imports:
    - pyhdbpp
  commands:
    - pip check
    - hdbpp-reader --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://gitlab.com/tango-controls/hdbpp/libhdbpp-python
  summary: hdb++ python3 API
  license: LGPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ovallcorba
    - sergirubio
